proxmox__role_enabled: false

proxmox__manage_repo_keys: false
proxmox__manage_repos: false
proxmox__manage_packages: false
proxmox__manage_pools: false
proxmox__manage_roles: false
proxmox__manage_user_groups: false
proxmox__manage_users: false
proxmox__manage_acls: false

proxmox__remove_subscription_warning: false
proxmox__use_freenas: false

proxmox__freenas:
  remote_src: true
  git:
    repo: https://github.com/TheGrandWazoo/freenas-proxmox
    clone: true
  file_mgr:
    - entry__type: patch
      src: pve-manager/js/pvemanagerlib.js.patch
      dest: /usr/share/pve-manager/js/pvemanagerlib.js
      entry__handlers: restart_pve_services
    - entry__type: patch
      src: pve-manager/js/pvemanagerlib.js.patch
      dest: /usr/share/pve-manager/js/pvemanagerlib.js
      entry__handlers: restart_pve_services
    - entry__type: patch
      src: pve-manager/js/pvemanagerlib.js.patch
      dest: /usr/share/pve-manager/js/pvemanagerlib.js
      entry__handlers: restart_pve_services
    - entry__type: patch
      src: pve-manager/js/pvemanagerlib.js.patch
      dest: /usr/share/pve-manager/js/pvemanagerlib.js
      entry__handlers: restart_pve_services
    - entry__type: copy
      src: perl5/PVE/Storage/LunCmd/FreeNAS.pm
      dest: /usr/share/perl5/PVE/Storage/LunCmd/FreeNAS.pm
      entry__handlers: restart_pve_services
    - entry__type: handlers
      name: restart_pve_services
      condition: any
      handlers: "{{ {'name': ['pvedaemon', 'pveproxy', 'pvestatd', 'pve-ha-lrm', 'pve-ha-crm']} | aybarsm.helper.to_list_of_dicts({'entry__type': 'service', 'state': 'restarted'}) }}"

proxmox__clusters: {}

proxmox__use_only: ['host', 'group', 'default']

proxmox__default: []
proxmox__group: []
proxmox__host: []

proxmox__repos:
  types:
    enterprise:
      url: https://enterprise.proxmox.com/debian
    no_subscription:
      url: http://download.proxmox.com/debian
  keys:
    bookworm:
      url: https://enterprise.proxmox.com/debian/proxmox-release-bookworm.gpg
      keyring: /etc/apt/trusted.gpg.d/proxmox-release-bookworm.gpg
    bullseye:
      url: https://enterprise.proxmox.com/debian/proxmox-release-bullseye.gpg
      keyring: /etc/apt/trusted.gpg.d/proxmox-release-bullseye.gpg

proxmox__purposes:
  pve:
    packages: ['pve-manager']
    repo:
      file: 'pve-<<REPO_TYPE>>'
      suffix: 'pve-<<REPO_TYPE>>'
  pbs:
    packages: ['proxmox-backup-server']
    repo:
      file: 'pbs-<<REPO_TYPE>>'
      suffix: 'pbs-<<REPO_TYPE>>'
  pmg: 
    packages: ['proxmox-mailgateway']
    repo:
      file: 'pmg-<<REPO_TYPE>>'
      suffix: 'pbs-<<REPO_TYPE>>'
  ceph_pacific:
    packages: ['ceph', 'ceph-common', 'ceph-mds', 'ceph-fuse']
    repo:
      file: 'ceph'
      suffix: '<<REPO_TYPE>>'
  ceph_quincy:
    packages: ['ceph', 'ceph-common', 'ceph-mds', 'ceph-fuse']
    repo:
      file: 'ceph'
      suffix: '<<REPO_TYPE>>'
  ceph_reef:
    packages: ['ceph', 'ceph-common', 'ceph-mds', 'ceph-fuse']
    repo:
      file: 'ceph'
      suffix: '<<REPO_TYPE>>'
  zfs:
    packages: ['zfsutils-linux', 'zfs-initramfs', 'zfs-zed']
  freenas:
    packages: ['librest-client-perl', 'git', 'patch']
    params:
      task_file: freenas.yml
      remote_src: true